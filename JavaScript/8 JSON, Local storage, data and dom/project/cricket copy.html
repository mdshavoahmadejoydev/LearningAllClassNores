<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket game</title>
    <link rel="stylesheet" href="index.css">
    <style>
        
    </style>


</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <button onclick="

    let computerChoice = generateComputerChouse()
    let resultMsg = getresult('Bat', computerChoice);
    showResult('Bat', computerChoice, resultMsg);

    "><img class="img" src="./img/bat.png" alt=""></button>



    <button onclick="
    
    computerChoice = generateComputerChouse();
    resultMsg = getresult('Ball', computerChoice);
    showResult('Ball', computerChoice, resultMsg);

    "><img class="img" src="./img/ball.png" alt=""></button>



    <button onclick="
    
    computerChoice =  generateComputerChouse()
    resultMsg = getresult('Stump', computerChoice);
    showResult('Stump', computerChoice, resultMsg);

    "><img class="img" src="./img/stump.png" alt=""></button>



    <h2 id="user-move"></h2>
    <h2 id="computer-move"></h2>
    <h2 id="result"></h2>
    <h2 id="score"></h2>

    <button id="reset" onclick="
    localStorage.clear();
    resetScore();
    "><img class="imge" src="./img/reset-removebg-preview.png" alt=""></button>


    <script>

        let scoreStr = localStorage.getItem('score');
        let score;
        resetScore(scoreStr);

        function  resetScore(scoreStr) {
            score = scoreStr ? JSON.parse(scoreStr) : {
                win: 0,
                lost: 0,
                tie: 0,
            };

        
            score.displayScore = function() {
                return `Score: win ${score.win}, lost ${score.lost} and tie ${score.tie}`;
            }
            showResult();
        } 

        function generateComputerChouse() {
            
            let rendomNumber = Math.random() * 3;
            if (rendomNumber <= 1) {
                return 'Bat';

            } else if ( rendomNumber <= 2) {
                return 'Ball';
            } else {
                return 'Stump';
            }
            
        }
        
        function getresult(userMove, computerMove) {
            if (userMove === 'Bat')  {
                if (computerMove === 'Ball') {
                    score.win ++;
                    return 'User won';
                } else if (computerMove === 'Bat') {
                    score.tie ++;
                    return `it's a tie`;
                } else if (computerMove === 'Stump') {
                    score.lost ++;
                    return 'Computer has won';
                }
            } else if (userMove === 'Ball') {
                if (computerMove === 'Ball') {
                    score.tie ++;
                    return 'its a tie';
                } else if (computerMove === 'Bat') {
                    score.lost ++;
                    return 'Computer has won';
                } else if (computerMove === 'Stump') {
                    score.win ++;
                    return 'User won';
                }
            } else {
                if (computerMove === 'Ball') {
                    score.lost ++;
                    return 'Computer has won';
                } else if (computerMove === 'Bat') {
                    score.win ++;
                    return 'User won';
                } else if (computerMove === 'Stump') {
                    score.tie ++;
                    return `it's a tie`;
                }
            }
        }

        function showResult(userMove, computerMove, result) {
            localStorage.setItem('score', JSON.stringify(score));

            document.querySelector('#user-move').innerText = 
            userMove ? `You have chosen ${userMove}` : '';
            document.querySelector('#computer-move').innerText = 
            computerMove ? `Computer has chosen ${computerMove}` : '';
            document.querySelector('#result').innerText = 
            result || '';
            document.querySelector('#score').innerText = score.displayScore();

        }
        
    </script>
</body>
</html>
