    //Task-3 Create a Button  which shows the number how many times it has been pressed

    let numberOfClicked = localStorage.getItem('numberOfClicked') || 0;

    function buttonPressed() {
      numberOfClicked++;
      localStorage.setItem('numberOfClicked', numberOfClicked)
      ubdateButton();
    }

    function ubdateButton() {
      let button = document.querySelector('#my-button');
      if (numberOfClicked % 2 === 0) {
        button.classList.remove('js-odd');
        button.classList.add('js-even');
      } else {
        button.classList.remove('js-even');
        button.classList.add('js-odd');
      }
      button.innerText = numberOfClicked;
    }
    ubdateButton();

  </script>
