        function  resetScore(scoreStr) {
            score = scoreStr ? JSON.parse(scoreStr) : {
                win: 0,
                lost: 0,
                tie: 0,
            };

        
            score.displayScore = function() {
                return `No of matches win ${score.win}, lost ${score.lost} and tie ${score.tie}`;

        function generateComputerChouse() {
            
            let rendomNumber = Math.random() * 3;
            if (rendomNumber <= 1) {
                return 'Bat';

            } else if ( rendomNumber <= 2) {
                return 'Ball';
            } else {
                return 'Stump';
            }
            
        }
        
        function getresult(userMove, computerMove) {
            if (userMove === 'Bat')  {
                if (computerMove === 'Ball') {
                    score.win ++;
                    return 'User won';
                } else if (computerMove === 'Bat') {
                    score.tie ++;
                    return `it's a tie`;
                } else if (computerMove === 'Stump') {
                    score.lost ++;
                    return 'Computer has won';
                }
            } else if (userMove === 'Ball') {
                if (computerMove === 'Ball') {
                    score.tie ++;
                    return 'its a tie';
                } else if (computerMove === 'Bat') {
                    score.lost ++;
                    return 'Computer has won';
                } else if (computerMove === 'Stump') {
                    score.win ++;
                    return 'User won';
                }
            } else {
                if (computerMove === 'Ball') {
                    score.lost ++;
                    return 'Computer has won';
                } else if (computerMove === 'Bat') {
                    score.win ++;
                    return 'User won';
                } else if (computerMove === 'Stump') {
                    score.tie ++;
                    return `it's a tie`;
                }
            }
        }

        function showResult(userMove, computerMove, result) {
            localStorage.setItem('score', JSON.stringify(score));
            alert(`You have chosen ${userMove}. Computer chosen is ${computerMove}
            ${result}
            
            ${score.displayScore()}`);
        }
