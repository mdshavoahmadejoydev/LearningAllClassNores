<body>
    <script>
        let age = 53;
        let gender = 'femaile'; //possible value = male or femaile
        let finalDiscount = '';

        if (age <= 5) {
            finalDiscount = 0;
        } else if (gender === 'femaile' || age <= 8) {
            finalDiscount = 50;

            finalDiscount = 30;

        }
        
        console.log (finalDiscount);



    </script>
