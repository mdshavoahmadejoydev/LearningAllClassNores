<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .box{
            height: 50px;
            width: 50px;
            background-color: red;
            color: white;
            margin: 10px;
        }
        #box1{
            position: static;
            z-index: 2;
        }
        #box2{
            position: relative;
            top: 10px;
            left: 50px
        }
        #box3{
            position: absolute;
            top: 20px;
            z-index: -1;
        }
        #box4{
            position: fixed;
            right: 50px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">box1</div>
    <div id="box2" class="box">box2</div>
    <div id="box3" class="box">box3</div>
    <div id="box4" class="box">box4</div>
    <div id="box5" class="box">box5</div>
    <div class="box">box6</div>
    <div class="box">box7</div>
    <div class="div">box8</div>

    <h1>Z-index</h1>
    <!--Z index element er position defined kore. positive hole sey element page er opor a show korbe . mane 1st layer a thakbe. 
    value er chyte joto niche nambe, totoy element webpage er vitore set hobe/ses er layer a set hobe-->

</body>
</html>
