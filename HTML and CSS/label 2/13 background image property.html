<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background image property</title>
    <style>
        #icon{
            height: 50px;
            width: 50px;
            background-image: url(../asset/image/png.png);
            background-size: contain;
            /* contain er jonno image size joto boro hok ta kno . image amader deowa size and width nye nibe */
            background-repeat: no-repeat;
            /* amader deowa size and width bro holeow image extra jayge peye seta repeat korbe na */
            background-position: top;
        }
    </style>
</head>
<body>
    <div id="icon"></div>    
</body>
</html>
