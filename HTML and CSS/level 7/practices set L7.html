<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practices set level7</title>
    <style>
        .progress_container{
            height: 20px;
            width: 80%;
            background-color: aliceblue;
            border-radius: 30px;
            border: 2px solid black;
            position: relative;
            left: 10%;
            
        }
        .progress_bar{
            height: 100%;
            
            background-color: red;
            border-radius: 30px;
            animation: progress 3s;
        }
        @keyframes progress {
            0% {width: 4%;}
            70% {width: 95%;}
            75% {width: 5%;}
            85% {width: 98%;}
            100% {width: 100%;}
        }
    </style>
</head>
<body>
    <div class="progress_container">
        <div class="progress_bar"></div>
    </div>
</body>
</html>
