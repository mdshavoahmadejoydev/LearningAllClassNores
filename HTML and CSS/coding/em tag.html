<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>em tag</title>
</head>
<body>
    <!-- <em> ট্যাগ ব্যবহার করা হয় কোনো শব্দ বা বাক্যকে গুরুত্ব দিয়ে দেখানোর জন্য।
        
    <em> vs <i>

    <em> → গুরুত্ব বোঝাতে italic স্টাইলের সাথে লিখা হয় (semantic meaning আছে)
    
    <i> → শুধু italic স্টাইল দেখানোর জন্য
        
    -->

    <p>This is <em>very important</em> information.</p>

    <p>this is very <em>important</em> information</p>
</body>
</html>
