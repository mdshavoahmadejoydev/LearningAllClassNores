<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--ুspan tag
    
    ai tag er maddhome amra je kno jaygar je kno text ke target korte parbo. kno passage er moddhe je kno word er id class dye setar CSS control korte parbo-->

    <p>এটার কালার <span id="red" style="color:red">লাল</span> এটা কালার আমার অনেক ভালোলাগে</p>
    
    <p>স্কোর: <span id="score">0</span></p>
    <script>
        document.getElementById("score").innerText = 10;
    </script>
</body>
</html>
