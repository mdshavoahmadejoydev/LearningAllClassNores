<!DOCTYPE html>

<body>
    <!-- ট্যাগের কাজ হলো নতুন করে যোগ করা (inserted) লেখা বোঝানো। সাধারণত এটি দেখাতে ব্যবহার করা হয় যে কোনো টেক্সট পরে যোগ করা হয়েছে বা সংশোধনের সময় নতুন করে ঢোকানো হয়েছে। -->

    <p>এই বইয়ের দাম <del>500</del> <ins>400</ins> টাকা।</p>
</body>
</html>
