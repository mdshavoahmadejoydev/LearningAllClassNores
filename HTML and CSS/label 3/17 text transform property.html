<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text transform property</title>
    <style>
        #text_1{
            text-transform: capitalize;
        }
        #text_2{
            text-transform: uppercase;
        }
        #text_3{
            text-transform: lowercase;
        }
        #text_4{
            text-transform: none;
        }
    </style>
</head>
<body>
    <h1 id="text_1">md shava ahmade joy</h1>
    <h1 id="text_2">md shava ahmade joy</h1>
    <h1 id="text_3">MD SHAVO AHMADE JOY</h1>
    <h1 id="text_4">kd SHAVO ahmade Joy</h1>
</body>
</html>
