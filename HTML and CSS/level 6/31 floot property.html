<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>floot property</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #container{
            height: 200px;
            width: 500px;
            background-color: palevioletred;
            border: 3px solid black;
        }
        .box{
            height: 150px;
            width: 150px;
            border: 3px solid black;
            background-color: lightgreen;
            margin: 5px;
        }
        #box1{
            float: left;
        }
        #box2{
            float: right;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box" id="box1">box1</div>
        <div class="box" id="box2">box2</div>
    </div>
    <!--destination float:
    div tag holo block element. tay box aktar pore opor ta asr kotha. 
    
    block elemnent er 2ta element ke ak line a niye asr jonno amra 'float' property used korbo.
    
    float property r possible value sudhu 2ta i) left, ii) right,-->
</body>
</html>
